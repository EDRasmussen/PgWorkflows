server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (server-level so they apply to every location)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    error_page 404 /404.html;

    # Content-hashed Astro assets and Pagefind index chunks — cache for a year.
    # `expires` (not add_header) so the server-level headers above still apply.
    location /_astro/ {
        expires 1y;
    }

    location /pagefind/ {
        expires 1y;
    }

    # HTML pages: always revalidate so deploys show up immediately
    location / {
        try_files $uri $uri/ =404;
        expires -1;
    }
}
