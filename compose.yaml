x-example-worker: &example-worker
  build:
    context: .
    dockerfile: example/Example.Worker/Dockerfile
  depends_on:
    postgres:
      condition: service_healthy

x-example-worker-env: &example-worker-env
  PGWORKFLOWS_CONNECTION_STRING: Host=postgres;Port=5432;Database=pgworkflows;Username=postgres;Password=postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: pgworkflows-postgres
    environment:
      POSTGRES_DB: pgworkflows
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgworkflows"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgworkflows-postgres-data:/var/lib/postgresql/data

  example-api:
    build:
      context: .
      dockerfile: example/Example.Api/Dockerfile
    container_name: pgworkflows-example-api
    environment:
      PGWORKFLOWS_CONNECTION_STRING: Host=postgres;Port=5432;Database=pgworkflows;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  example-worker-1:
    <<: *example-worker
    container_name: pgworkflows-example-worker-1
    environment:
      <<: *example-worker-env
      PGWORKFLOWS_WORKER_ID: worker-1

  example-worker-2:
    <<: *example-worker
    container_name: pgworkflows-example-worker-2
    environment:
      <<: *example-worker-env
      PGWORKFLOWS_WORKER_ID: worker-2

  example-worker-3:
    <<: *example-worker
    container_name: pgworkflows-example-worker-3
    environment:
      <<: *example-worker-env
      PGWORKFLOWS_WORKER_ID: worker-3

volumes:
  pgworkflows-postgres-data:
